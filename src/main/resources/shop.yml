# =============================================
#         V-Shards — Shop Configuration
#         Version: 1.0.0 | Author: reakkz
# =============================================
# Supports & legacy color codes in display_name, lore, and menu_title.
#
# Item types:
#   buy   — deducts shards, gives item (or runs commands)
#   sell  — takes item from inventory, gives shards
#   close — closes the GUI
#
# Optional command fields (buy / sell):
#   command-console: runs as CONSOLE, supports %player%
#   command-player:  runs as the PLAYER
#   If commands are defined, no item is given/taken — commands handle the reward.
#   Set amount: 0 when using commands.
# =============================================

